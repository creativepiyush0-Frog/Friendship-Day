<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Someone Special 💖</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { background: linear-gradient(135deg, #fce7f3 0%, #f0e6ff 50%, #fdf2f8 100%); min-height: 100vh; }
.page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; position: relative; z-index: 1; }
.section-title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 7vw, 3.5rem); font-weight: 700; background: linear-gradient(135deg, #ec4899, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-align: center; margin-bottom: 2.5rem; animation: glowPulse 3s infinite; }
.polaroids-wrap { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; margin: 1.5rem 0 2.5rem; }
.polaroid-item { animation: swingFloat 5s ease-in-out infinite; transform-origin: top center; }
.polaroid-item:nth-child(2) { animation-delay: -2.5s; }
@keyframes swingFloat {
  0%,100% { transform: rotate(-5deg) translateY(0); }
  25% { transform: rotate(3deg) translateY(-15px); }
  75% { transform: rotate(-2deg) translateY(-8px); }
}
.polaroid-item .polaroid { min-width: 150px; max-width: 200px; }
.polaroid-item .polaroid img { height: 200px; object-fit: cover; }
.heart-burst { position: fixed; pointer-events: none; font-size: 1.4rem; animation: floatUp linear infinite; z-index: 0; }
.quote2 { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.15rem; color: #4a1942; text-align: center; max-width: 480px; line-height: 1.7; margin-bottom: 2rem; padding: 1.5rem 2rem; }
.btn-section { text-align: center; }
</style>
</head>
<body>
<div id="loading"><div class="loading-heart">💖</div></div>
<div id="progress-bar"></div>
<div class="particles-container"></div>
<div class="controls">
  <button class="ctrl-btn" id="music-btn" onclick="toggleMusic()">🎵</button>
  <button class="ctrl-btn" id="dark-btn" onclick="toggleDark()">🌙</button>
</div>

<div class="page page-content">
  <div class="section-title">Someone Very Special 💖</div>

  <div class="polaroids-wrap" id="polaroids"></div>

  <div class="glass-card quote2">
    "You make every ordinary moment extraordinary just by being in it. 
    Thank you for your smile that brightens my whole world. 🌟"
  </div>

  <div class="btn-section">
    <a href="gallery.html" class="surprise-btn">💖 FINAL SURPRISE 💖</a>
  </div>
</div>

<button id="back-to-top" onclick="scrollTop()">↑</button>

<script src="js/photos.js"></script>
<script src="js/main.js"></script>
<script src="js/animations.js"></script>
<script>
const polaroids = document.getElementById('polaroids');
const captions = ["My Favourite 🌸", "Pure Sunshine ✨", "Always Glowing 💕", "Forever Friend 💖"];
PHOTOS.forEach((src, i) => {
  const div = document.createElement('div');
  div.className = 'polaroid-item';
  div.innerHTML = `
    <div class="polaroid">
      <img src="${src}" alt="Photo ${i+1}">
      <p>${captions[i % captions.length]}</p>
    </div>
  `;
  polaroids.appendChild(div);
});

// Heart burst background
for (let i = 0; i < 14; i++) {
  const h = document.createElement('div');
  h.className = 'heart-burst';
  h.textContent = ['💖','💗','💕','❤️','💝','💓'][i % 6];
  h.style.left = Math.random() * 100 + '%';
  h.style.animationDuration = (6 + Math.random() * 8) + 's';
  h.style.animationDelay = (Math.random() * 7) + 's';
  document.body.appendChild(h);
}
</script>
</body>
</html>
