<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery 🌸</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { background: linear-gradient(135deg, #fdf2f8 0%, #ede9fe 100%); min-height: 100vh; }
.page { padding: 3rem 1.5rem 4rem; position: relative; z-index: 1; }
.page-header { text-align: center; margin-bottom: 2.5rem; }
.page-title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 700; background: linear-gradient(135deg, #ec4899, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.gallery-grid { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.2rem; margin-bottom: 2rem; }
.gallery-item { position: relative; border-radius: 18px; overflow: hidden; cursor: pointer; box-shadow: 0 6px 20px rgba(236,72,153,0.2); transition: transform 0.4s, box-shadow 0.4s; animation: fadeInUp 0.6s ease both; }
.gallery-item:hover { transform: scale(1.04); box-shadow: 0 16px 40px rgba(236,72,153,0.4); }
.gallery-item img { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; transition: transform 0.5s; }
.gallery-item:hover img { transform: scale(1.07); }
.gallery-overlay { position: absolute; inset: 0; background: rgba(139,92,246,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; font-size: 2.5rem; }
.gallery-item:hover .gallery-overlay { opacity: 1; }

/* Lightbox */
#lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9998; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
#lightbox.active { display: flex; animation: fadeIn 0.3s ease; }
#lb-img { max-width: 90vw; max-height: 80vh; border-radius: 16px; object-fit: contain; transition: opacity 0.25s; box-shadow: 0 0 60px rgba(236,72,153,0.5); }
.lb-controls { display: flex; gap: 1.5rem; align-items: center; }
.lb-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; width: 48px; height: 48px; border-radius: 50%; font-size: 1.3rem; cursor: pointer; transition: background 0.2s; }
.lb-btn:hover { background: rgba(236,72,153,0.4); }
#lb-counter { color: rgba(255,255,255,0.7); font-size: 0.9rem; min-width: 60px; text-align: center; }
.lb-close { position: absolute; top: 1rem; right: 1.5rem; background: none; border: none; color: white; font-size: 2rem; cursor: pointer; }
.slideshow-btn { background: linear-gradient(135deg, #ec4899, #8b5cf6); border: none; color: white; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; }

.btn-section { text-align: center; margin-top: 2rem; }
</style>
</head>
<body>
<div id="loading"><div class="loading-heart">🌸</div></div>
<div id="progress-bar"></div>
<div class="particles-container"></div>
<div class="controls">
  <button class="ctrl-btn" id="music-btn" onclick="toggleMusic()">🎵</button>
  <button class="ctrl-btn" id="dark-btn" onclick="toggleDark()">🌙</button>
</div>

<div class="page page-content">
  <div class="page-header">
    <div class="page-title">Our Photo Gallery 🌸</div>
    <p style="color:#8b5cf6;font-style:italic;margin-top:0.5rem">Every picture tells our story</p>
  </div>

  <div class="gallery-grid" id="gallery-grid"></div>

  <div class="btn-section">
    <a href="final-message.html" class="surprise-btn">🌸 LAST SURPRISE 🌸</a>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lb-img" src="" alt="Gallery Image">
  <div class="lb-controls">
    <button class="lb-btn" onclick="lbPrev()">‹</button>
    <span id="lb-counter"></span>
    <button class="lb-btn" onclick="lbNext()">›</button>
    <button class="slideshow-btn" onclick="startSlideshow()">▶ Slideshow</button>
  </div>
</div>

<button id="back-to-top" onclick="scrollTop()">↑</button>

<script src="js/photos.js"></script>
<script src="js/main.js"></script>
<script src="js/animations.js"></script>
<script src="js/gallery.js"></script>
<script>
const grid = document.getElementById('gallery-grid');
PHOTOS.forEach((src, i) => {
  const item = document.createElement('div');
  item.className = 'gallery-item';
  item.style.animationDelay = (i * 0.15) + 's';
  item.innerHTML = `<img src="${src}" alt="Photo ${i+1}" loading="lazy"><div class="gallery-overlay">🔍</div>`;
  item.onclick = () => openLightbox(i);
  grid.appendChild(item);
});
</script>
</body>
</html>
