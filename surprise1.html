<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise 1 💕</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { background: linear-gradient(135deg, #fce7f3 0%, #ede9fe 50%, #fdf2f8 100%); min-height: 100vh; }
.page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; position: relative; z-index: 1; }
.quote-card { padding: 3rem; max-width: 640px; width: 100%; text-align: center; animation: fadeInUp 1s ease; margin-bottom: 2.5rem; }
.quote { font-family: 'Playfair Display', serif; font-size: clamp(1.4rem, 4vw, 2.2rem); color: #4a1942; font-style: italic; line-height: 1.6; margin-bottom: 1rem; }
.quote-attr { color: #8b5cf6; font-size: 0.95rem; }
.floating-photos { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; margin: 2rem 0; position: relative; z-index: 1; }
.fp { width: 160px; height: 200px; border-radius: 20px; overflow: hidden; border: 3px solid rgba(255,255,255,0.7); box-shadow: 0 8px 30px rgba(236,72,153,0.25); animation: float 4s ease-in-out infinite; cursor: pointer; }
.fp:nth-child(2) { animation-delay: -2s; animation-duration: 5s; }
.fp img { width: 100%; height: 100%; object-fit: cover; }
.btn-section { text-align: center; margin-top: 1rem; }
.rain-heart { position: fixed; pointer-events: none; z-index: 0; font-size: 1.5rem; animation: floatUp linear infinite; }
@keyframes float { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-20px) rotate(3deg)} }
</style>
</head>
<body>
<div id="loading"><div class="loading-heart">💕</div></div>
<div id="progress-bar"></div>
<div class="particles-container"></div>
<div class="controls">
  <button class="ctrl-btn" id="music-btn" onclick="toggleMusic()">🎵</button>
  <button class="ctrl-btn" id="dark-btn" onclick="toggleDark()">🌙</button>
</div>

<div class="page page-content">
  <div class="glass-card quote-card">
    <div class="quote">"A real friend is one who walks in when the rest of the world walks out."</div>
    <div class="quote-attr">— Walter Winchell</div>
  </div>

  <div class="floating-photos" id="photo-frames"></div>

  <div class="btn-section">
    <a href="surprise2.html" class="surprise-btn">❤️ SURPRISE ❤️</a>
  </div>
</div>

<button id="back-to-top" onclick="scrollTop()">↑</button>

<script src="js/photos.js"></script>
<script src="js/main.js"></script>
<script src="js/animations.js"></script>
<script>
const frames = document.getElementById('photo-frames');
PHOTOS.forEach((src, i) => {
  const div = document.createElement('div');
  div.className = 'fp';
  div.style.animationDelay = (i * -1.5) + 's';
  div.innerHTML = `<img src="${src}" alt="Memory ${i+1}" loading="lazy">`;
  frames.appendChild(div);
});

// Heart rain
for (let i = 0; i < 12; i++) {
  const h = document.createElement('div');
  h.className = 'rain-heart';
  h.textContent = ['❤️','💕','💗','💖','💝'][i % 5];
  h.style.left = Math.random() * 100 + '%';
  h.style.animationDuration = (5 + Math.random() * 8) + 's';
  h.style.animationDelay = (Math.random() * 6) + 's';
  document.body.appendChild(h);
}
</script>
</body>
</html>
