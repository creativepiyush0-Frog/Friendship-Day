<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories ✨</title>
<link rel="stylesheet" href="css/style.css">
<style>
body { background: linear-gradient(135deg, #fdf2f8 0%, #ede9fe 100%); min-height: 100vh; }
.page { padding: 3rem 1.5rem 4rem; position: relative; z-index: 1; }
.page-header { text-align: center; margin-bottom: 3rem; animation: fadeInUp 1s ease; }
.page-title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 700; background: linear-gradient(135deg, #ec4899, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.page-sub { color: #8b5cf6; font-size: 1.1rem; margin-top: 0.5rem; }
.memory-wall { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
.memory-card { border-radius: 20px; overflow: hidden; position: relative; animation: fadeInUp 0.8s ease both; box-shadow: 0 8px 30px rgba(236,72,153,0.2); transition: transform 0.4s, box-shadow 0.4s; cursor: pointer; aspect-ratio: 3/4; }
.memory-card:hover { transform: scale(1.04) translateY(-6px); box-shadow: 0 20px 50px rgba(236,72,153,0.4); }
.memory-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
.memory-card:hover img { transform: scale(1.08); }
.memory-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(139,92,246,0.7) 0%, transparent 60%); opacity: 0; transition: opacity 0.4s; display: flex; align-items: flex-end; padding: 1.2rem; }
.memory-card:hover .memory-overlay { opacity: 1; }
.memory-label { color: white; font-family: 'Playfair Display', serif; font-size: 1.1rem; font-style: italic; }
.glow-ring { position: absolute; inset: -4px; border-radius: 24px; background: linear-gradient(135deg, #ec4899, #8b5cf6); z-index: -1; opacity: 0; transition: opacity 0.4s; }
.memory-card:hover .glow-ring { opacity: 1; }
.btn-section { text-align: center; margin-top: 3rem; }
.reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.7s, transform 0.7s; }
.revealed { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>
<div id="loading"><div class="loading-heart">🌸</div></div>
<div id="progress-bar"></div>
<div class="particles-container"></div>
<div class="controls">
  <button class="ctrl-btn" id="music-btn" onclick="toggleMusic()">🎵</button>
  <button class="ctrl-btn" id="dark-btn" onclick="toggleDark()">🌙</button>
</div>

<div class="page page-content">
  <div class="page-header">
    <div class="page-title">Our Amazing Memories ✨</div>
    <p class="page-sub">Every moment with you is a treasure</p>
  </div>

  <div class="memory-wall" id="memory-wall"></div>

  <div class="btn-section reveal">
    <a href="surprise3.html" class="surprise-btn">✨ OPEN NEXT SURPRISE ✨</a>
  </div>
</div>

<button id="back-to-top" onclick="scrollTop()">↑</button>

<script src="js/photos.js"></script>
<script src="js/main.js"></script>
<script src="js/animations.js"></script>
<script>
const wall = document.getElementById('memory-wall');
const labels = ["Sunshine & Smiles 🌟", "Pure Joy 💖", "Always Beautiful 🌸", "Our Fav Moments 💕"];
PHOTOS.forEach((src, i) => {
  const card = document.createElement('div');
  card.className = 'memory-card reveal';
  card.style.animationDelay = (i * 0.2) + 's';
  card.innerHTML = `
    <img src="${src}" alt="Memory" loading="lazy">
    <div class="memory-overlay"><div class="memory-label">${labels[i % labels.length]}</div></div>
    <div class="glow-ring"></div>
  `;
  wall.appendChild(card);
});
</script>
</body>
</html>
